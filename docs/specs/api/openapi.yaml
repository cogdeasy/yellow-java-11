openapi: 3.0.3
info:
  title: Liberty Mutual Insurance Platform API — Java 11 Edition
  description: >
    Spec-Driven Development demo — Insurance platform with policyholder records,
    policy management, premium recalculation, and compliance audit trail.
    Implemented in Java 11 with Spring Boot 2.7.x.
  version: 1.0.0
  contact:
    name: Engineering Team

servers:
  - url: http://localhost:3001
    description: Customer Service (Policyholder Records)
  - url: http://localhost:3002
    description: Policy Service (Policy Platform)
  - url: http://localhost:3003
    description: Audit Service (Compliance Data Store)

paths:
  # ── Customer Service (port 3001) ──────────────────────────────
  /api/v1/customers:
    get:
      summary: List policyholder profiles
      tags: [Customer Service]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: state
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Customer'
                  total:
                    type: integer
    post:
      summary: Create a new policyholder profile
      tags: [Customer Service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerRequest'
      responses:
        '201':
          description: Customer created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/customers/{id}:
    get:
      summary: Get policyholder by ID
      tags: [Customer Service]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found

  /api/v1/customers/{id}/address:
    patch:
      summary: Change policyholder home address
      tags: [Customer Service]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressChangeRequest'
      responses:
        '200':
          description: Address updated, premium recalculation triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressChangeResponse'
        '400':
          description: Validation error
        '404':
          description: Customer not found

  # ── Policy Service (port 3002) ────────────────────────────────
  /api/v1/policies:
    get:
      summary: List policies
      tags: [Policy Service]
      parameters:
        - name: customer_id
          in: query
          schema:
            type: string
            format: uuid
        - name: type
          in: query
          schema:
            type: string
            enum: [home, auto, life, umbrella]
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, pending_review]
      responses:
        '200':
          description: List of policies
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Policy'
                  total:
                    type: integer
    post:
      summary: Create a new policy
      tags: [Policy Service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
      responses:
        '201':
          description: Policy created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '400':
          description: Validation error

  /api/v1/policies/{id}:
    get:
      summary: Get policy by ID
      tags: [Policy Service]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Policy details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          description: Policy not found

  /api/v1/policies/{id}/recalculate:
    post:
      summary: Recalculate premium for address change
      tags: [Policy Service]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_zipcode]
              properties:
                new_zipcode:
                  type: string
                  pattern: '^\d{5}$'
                old_zipcode:
                  type: string
                  pattern: '^\d{5}$'
      responses:
        '200':
          description: Premium recalculated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecalculationResult'
        '404':
          description: Policy not found

  /api/v1/zip-risk/{zipcode}:
    get:
      summary: Get risk factors for a ZIP code
      tags: [Policy Service]
      parameters:
        - name: zipcode
          in: path
          required: true
          schema:
            type: string
            pattern: '^\d{5}$'
      responses:
        '200':
          description: Risk factors for the ZIP code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ZipRiskFactors'
        '404':
          description: ZIP code not found

  # ── Audit Service (port 3003) ─────────────────────────────────
  /api/v2/audit-trail:
    get:
      summary: Aggregated audit trail with cross-service enrichment
      tags: [Audit Service]
      parameters:
        - name: entity_type
          in: query
          schema:
            type: string
            enum: [customer, policy]
        - name: entity_id
          in: query
          schema:
            type: string
            format: uuid
        - name: source
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Aggregated audit trail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'
                  total:
                    type: integer

  /api/v2/audit-trail/{type}/{id}:
    get:
      summary: Audit trail for a specific entity
      tags: [Audit Service]
      parameters:
        - name: type
          in: path
          required: true
          schema:
            type: string
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Entity audit trail
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditEvent'

  /api/v2/audit-trail/summary/stats:
    get:
      summary: Audit trail summary statistics
      tags: [Audit Service]
      responses:
        '200':
          description: Audit statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditStats'

  /api/v2/audit-events:
    post:
      summary: Ingest audit event (CloudEvents v1.0)
      tags: [Audit Service]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudEvent'
      responses:
        '201':
          description: Event ingested
        '400':
          description: Invalid CloudEvents payload

  # ── Health Checks (Spring Boot Actuator) ─────────────────────
  /actuator/health:
    get:
      summary: Health check (Spring Boot Actuator — all services)
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [UP]

components:
  schemas:
    Address:
      type: object
      required: [street, city, state, zip]
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
          minLength: 2
          maxLength: 2
        zip:
          type: string
          pattern: '^\d{5}$'

    Customer:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'
        status:
          type: string
          enum: [active, inactive]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateCustomerRequest:
      type: object
      required: [first_name, last_name, email, address]
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          $ref: '#/components/schemas/Address'

    AddressChangeRequest:
      type: object
      required: [street, city, state, zip]
      properties:
        street:
          type: string
        city:
          type: string
        state:
          type: string
          minLength: 2
          maxLength: 2
        zip:
          type: string
          pattern: '^\d{5}$'

    AddressChangeResponse:
      type: object
      properties:
        customer:
          $ref: '#/components/schemas/Customer'
        premium_recalculation:
          $ref: '#/components/schemas/RecalculationResult'
        coverage_reevaluation:
          type: object
          properties:
            triggered:
              type: boolean
            state:
              type: string
            result:
              type: string

    Policy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        customer_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [home, auto, life, umbrella]
        status:
          type: string
          enum: [active, inactive, pending_review]
        premium_annual:
          type: number
          format: double
        coverage_amount:
          type: number
          format: double
        effective_date:
          type: string
          format: date
        expiry_date:
          type: string
          format: date
        zip_code:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreatePolicyRequest:
      type: object
      required: [customer_id, type, coverage_amount]
      properties:
        customer_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [home, auto, life, umbrella]
        coverage_amount:
          type: number
          format: double
        zip_code:
          type: string

    RecalculationResult:
      type: object
      properties:
        policy_id:
          type: string
          format: uuid
        old_premium:
          type: number
          format: double
        new_premium:
          type: number
          format: double
        risk_factors:
          $ref: '#/components/schemas/ZipRiskFactors'
        recalculated_at:
          type: string
          format: date-time

    ZipRiskFactors:
      type: object
      properties:
        zipcode:
          type: string
        flood_zone:
          type: boolean
        hurricane_risk:
          type: number
          format: double
        wildfire_risk:
          type: number
          format: double
        crime_rate:
          type: number
          format: double
        base_modifier:
          type: number
          format: double
        state:
          type: string
        requires_coverage_review:
          type: boolean

    CloudEvent:
      type: object
      required: [specversion, type, source, id, time, data]
      properties:
        specversion:
          type: string
          enum: ['1.0']
        type:
          type: string
        source:
          type: string
        id:
          type: string
          format: uuid
        time:
          type: string
          format: date-time
        data:
          type: object
          properties:
            entity_id:
              type: string
              format: uuid
            entity_type:
              type: string
            action:
              type: string
            actor:
              type: string
            changes:
              type: object
              properties:
                before:
                  type: object
                after:
                  type: object

    AuditEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        specversion:
          type: string
        type:
          type: string
        source:
          type: string
        time:
          type: string
          format: date-time
        entity_id:
          type: string
          format: uuid
        entity_type:
          type: string
        action:
          type: string
        actor:
          type: string
        changes:
          type: object
        enrichment:
          type: object
          description: Cross-service enrichment data

    AuditStats:
      type: object
      properties:
        total_events:
          type: integer
        events_by_type:
          type: object
          additionalProperties:
            type: integer
        events_by_source:
          type: object
          additionalProperties:
            type: integer
        time_range:
          type: object
          properties:
            earliest:
              type: string
              format: date-time
            latest:
              type: string
              format: date-time

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: object
