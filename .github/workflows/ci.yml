name: CI - Claims Management System

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -B

      - name: Run tests
        run: mvn test -B

      - name: Package
        run: mvn package -DskipTests -B

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: claims-management-jar
          path: target/*.jar

  security-check:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: |
          echo "NOTE: Dependency check intentionally reports vulnerabilities"
          echo "This project contains intentional vulnerable dependencies for demo purposes"
          echo "See docs/security/vulnerability-assessment.md for details"
          mvn dependency:tree -B
