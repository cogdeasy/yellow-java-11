server:
  port: 8080
  error:
    # VULNERABILITY: Including stack traces in error responses
    include-stacktrace: always
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: yellow-claims-management
  datasource:
    # VULNERABILITY: Hardcoded database credentials
    url: jdbc:h2:mem:claimsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password123
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    # VULNERABILITY: Showing SQL queries in logs (information disclosure)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      # VULNERABILITY: H2 console enabled and accessible
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  servlet:
    multipart:
      # ISSUE: No file size limit
      max-file-size: -1
      max-request-size: -1

# Application configuration
app:
  upload:
    dir: /tmp/uploads
  # VULNERABILITY: Hardcoded JWT secret
  jwt:
    secret: yellow-insurance-super-secret-jwt-key-2024-do-not-share
    expiration: 86400000
  # VULNERABILITY: Hardcoded API keys
  external:
    weather-api-key: wk_live_abc123def456ghi789
    geocoding-api-key: geo_sk_prod_xyz987654321
    payment-gateway-key: pk_live_51234567890abcdef

# VULNERABILITY: Debug/actuator endpoints exposed
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.yellowinsurance: DEBUG
    # ISSUE: Debug logging for Hibernate SQL
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
