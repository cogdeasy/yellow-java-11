version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: liberty_mutual
      POSTGRES_USER: liberty_dev
      POSTGRES_PASSWORD: liberty_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liberty_dev -d liberty_mutual"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Customer Service ────────────────────────────────────
  customer-service:
    build:
      context: .
      target: customer-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/liberty_mutual
      POSTGRES_USER: liberty_dev
      POSTGRES_PASSWORD: liberty_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUDIT_SERVICE_URL: http://audit-service:3003
      POLICY_SERVICE_URL: http://policy-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Policy Service ──────────────────────────────────────
  policy-service:
    build:
      context: .
      target: policy-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/liberty_mutual
      POSTGRES_USER: liberty_dev
      POSTGRES_PASSWORD: liberty_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUDIT_SERVICE_URL: http://audit-service:3003
      CUSTOMER_SERVICE_URL: http://customer-service:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Audit Service ───────────────────────────────────────
  audit-service:
    build:
      context: .
      target: audit-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/liberty_mutual
      POSTGRES_USER: liberty_dev
      POSTGRES_PASSWORD: liberty_dev
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CUSTOMER_SERVICE_URL: http://customer-service:3001
      POLICY_SERVICE_URL: http://policy-service:3002
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
